<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <!-- Sky gradient -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C9B89A"/>
      <stop offset="100%" stop-color="#8B6F47"/>
    </linearGradient>
    <!-- Awning stripe gradient -->
    <linearGradient id="awning" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2D7A6B"/>
      <stop offset="100%" stop-color="#1F5C50"/>
    </linearGradient>
    <!-- Floor gradient -->
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9E8B6E"/>
      <stop offset="100%" stop-color="#7A6A50"/>
    </linearGradient>
    <!-- Building gradient -->
    <linearGradient id="building" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C8B89A"/>
      <stop offset="100%" stop-color="#A8946E"/>
    </linearGradient>
    <!-- Shadow overlay -->
    <linearGradient id="shadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(0,0,0,0)" stop-opacity="0"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.4)" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Sky / background -->
  <rect width="800" height="400" fill="url(#sky)"/>

  <!-- Building facade -->
  <rect x="0" y="0" width="800" height="280" fill="url(#building)"/>

  <!-- Stone texture lines -->
  <line x1="0" y1="60" x2="800" y2="60" stroke="#B8A882" stroke-width="1" opacity="0.4"/>
  <line x1="0" y1="120" x2="800" y2="120" stroke="#B8A882" stroke-width="1" opacity="0.4"/>
  <line x1="0" y1="180" x2="800" y2="180" stroke="#B8A882" stroke-width="1" opacity="0.4"/>
  <line x1="160" y1="0" x2="160" y2="280" stroke="#B8A882" stroke-width="0.5" opacity="0.3"/>
  <line x1="320" y1="0" x2="320" y2="280" stroke="#B8A882" stroke-width="0.5" opacity="0.3"/>
  <line x1="480" y1="0" x2="480" y2="280" stroke="#B8A882" stroke-width="0.5" opacity="0.3"/>
  <line x1="640" y1="0" x2="640" y2="280" stroke="#B8A882" stroke-width="0.5" opacity="0.3"/>

  <!-- Windows upper floor -->
  <rect x="60" y="20" width="80" height="100" rx="4" fill="#4A3728" opacity="0.7"/>
  <rect x="62" y="22" width="76" height="96" rx="3" fill="#6B8FA0" opacity="0.5"/>
  <rect x="200" y="20" width="80" height="100" rx="4" fill="#4A3728" opacity="0.7"/>
  <rect x="202" y="22" width="76" height="96" rx="3" fill="#6B8FA0" opacity="0.5"/>
  <rect x="460" y="20" width="80" height="100" rx="4" fill="#4A3728" opacity="0.7"/>
  <rect x="462" y="22" width="76" height="96" rx="3" fill="#6B8FA0" opacity="0.5"/>
  <rect x="620" y="20" width="80" height="100" rx="4" fill="#4A3728" opacity="0.7"/>
  <rect x="622" y="22" width="76" height="96" rx="3" fill="#6B8FA0" opacity="0.5"/>

  <!-- Flower boxes on windows -->
  <rect x="58" y="116" width="84" height="12" rx="3" fill="#7A3B1E"/>
  <ellipse cx="70" cy="112" rx="6" ry="8" fill="#C0392B"/>
  <ellipse cx="84" cy="110" rx="5" ry="7" fill="#E74C3C"/>
  <ellipse cx="98" cy="113" rx="6" ry="8" fill="#C0392B"/>
  <ellipse cx="112" cy="111" rx="5" ry="7" fill="#E74C3C"/>
  <ellipse cx="126" cy="113" rx="6" ry="8" fill="#C0392B"/>
  <rect x="458" y="116" width="84" height="12" rx="3" fill="#7A3B1E"/>
  <ellipse cx="470" cy="112" rx="6" ry="8" fill="#C0392B"/>
  <ellipse cx="484" cy="110" rx="5" ry="7" fill="#E74C3C"/>
  <ellipse cx="498" cy="113" rx="6" ry="8" fill="#C0392B"/>
  <ellipse cx="512" cy="111" rx="5" ry="7" fill="#E74C3C"/>
  <ellipse cx="526" cy="113" rx="6" ry="8" fill="#C0392B"/>

  <!-- Teal awning body -->
  <rect x="0" y="140" width="800" height="60" fill="url(#awning)"/>

  <!-- Awning scalloped edge -->
  <path d="M0 200 Q20 215 40 200 Q60 215 80 200 Q100 215 120 200 Q140 215 160 200 Q180 215 200 200 Q220 215 240 200 Q260 215 280 200 Q300 215 320 200 Q340 215 360 200 Q380 215 400 200 Q420 215 440 200 Q460 215 480 200 Q500 215 520 200 Q540 215 560 200 Q580 215 600 200 Q620 215 640 200 Q660 215 680 200 Q700 215 720 200 Q740 215 760 200 Q780 215 800 200"
        fill="url(#awning)" stroke="#1F5C50" stroke-width="1"/>

  <!-- Gold awning text -->
  <text x="400" y="178" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="28" fill="#F5C842" letter-spacing="3">Café des Arts</text>

  <!-- Gold trim on awning -->
  <line x1="0" y1="144" x2="800" y2="144" stroke="#D4AF37" stroke-width="2" opacity="0.7"/>
  <line x1="0" y1="198" x2="800" y2="198" stroke="#D4AF37" stroke-width="1.5" opacity="0.5"/>

  <!-- Awning stripes (subtle) -->
  <rect x="0" y="140" width="40" height="60" fill="rgba(0,0,0,0.05)"/>
  <rect x="80" y="140" width="40" height="60" fill="rgba(0,0,0,0.05)"/>
  <rect x="160" y="140" width="40" height="60" fill="rgba(0,0,0,0.05)"/>
  <rect x="240" y="140" width="40" height="60" fill="rgba(0,0,0,0.05)"/>
  <rect x="320" y="140" width="40" height="60" fill="rgba(0,0,0,0.05)"/>
  <rect x="400" y="140" width="40" height="60" fill="rgba(0,0,0,0.05)"/>
  <rect x="480" y="140" width="40" height="60" fill="rgba(0,0,0,0.05)"/>
  <rect x="560" y="140" width="40" height="60" fill="rgba(0,0,0,0.05)"/>
  <rect x="640" y="140" width="40" height="60" fill="rgba(0,0,0,0.05)"/>
  <rect x="720" y="140" width="40" height="60" fill="rgba(0,0,0,0.05)"/>

  <!-- Floor / terrace -->
  <rect x="0" y="210" width="800" height="190" fill="url(#floor)"/>

  <!-- Floor paving lines -->
  <line x1="0" y1="240" x2="800" y2="240" stroke="#8A7A5E" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="270" x2="800" y2="270" stroke="#8A7A5E" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#8A7A5E" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="330" x2="800" y2="330" stroke="#8A7A5E" stroke-width="1" opacity="0.5"/>
  <line x1="100" y1="210" x2="100" y2="400" stroke="#8A7A5E" stroke-width="0.5" opacity="0.3"/>
  <line x1="200" y1="210" x2="200" y2="400" stroke="#8A7A5E" stroke-width="0.5" opacity="0.3"/>
  <line x1="300" y1="210" x2="300" y2="400" stroke="#8A7A5E" stroke-width="0.5" opacity="0.3"/>
  <line x1="400" y1="210" x2="400" y2="400" stroke="#8A7A5E" stroke-width="0.5" opacity="0.3"/>
  <line x1="500" y1="210" x2="500" y2="400" stroke="#8A7A5E" stroke-width="0.5" opacity="0.3"/>
  <line x1="600" y1="210" x2="600" y2="400" stroke="#8A7A5E" stroke-width="0.5" opacity="0.3"/>
  <line x1="700" y1="210" x2="700" y2="400" stroke="#8A7A5E" stroke-width="0.5" opacity="0.3"/>

  <!-- Café tables (round) -->
  <!-- Table 1 -->
  <ellipse cx="130" cy="290" rx="35" ry="12" fill="#5C4A2A" opacity="0.9"/>
  <rect x="127" y="285" width="6" height="60" rx="3" fill="#4A3820"/>
  <ellipse cx="130" cy="344" rx="18" ry="5" fill="#3A2C18" opacity="0.6"/>

  <!-- Table 2 -->
  <ellipse cx="320" cy="275" rx="35" ry="12" fill="#5C4A2A" opacity="0.9"/>
  <rect x="317" y="270" width="6" height="65" rx="3" fill="#4A3820"/>
  <ellipse cx="320" cy="334" rx="18" ry="5" fill="#3A2C18" opacity="0.6"/>

  <!-- Table 3 -->
  <ellipse cx="520" cy="285" rx="35" ry="12" fill="#5C4A2A" opacity="0.9"/>
  <rect x="517" y="280" width="6" height="62" rx="3" fill="#4A3820"/>
  <ellipse cx="520" cy="341" rx="18" ry="5" fill="#3A2C18" opacity="0.6"/>

  <!-- Table 4 -->
  <ellipse cx="700" cy="295" rx="35" ry="12" fill="#5C4A2A" opacity="0.9"/>
  <rect x="697" y="290" width="6" height="58" rx="3" fill="#4A3820"/>
  <ellipse cx="700" cy="347" rx="18" ry="5" fill="#3A2C18" opacity="0.6"/>

  <!-- Chairs (simplified) -->
  <!-- Chair near table 1 -->
  <rect x="80" y="265" width="28" height="32" rx="3" fill="#3D2E1A" opacity="0.85"/>
  <rect x="78" y="260" width="32" height="8" rx="3" fill="#4A3820" opacity="0.9"/>
  <rect x="84" y="297" width="5" height="18" rx="2" fill="#3D2E1A"/>
  <rect x="99" y="297" width="5" height="18" rx="2" fill="#3D2E1A"/>

  <!-- Chair near table 1 right -->
  <rect x="162" y="265" width="28" height="32" rx="3" fill="#3D2E1A" opacity="0.85"/>
  <rect x="160" y="260" width="32" height="8" rx="3" fill="#4A3820" opacity="0.9"/>
  <rect x="164" y="297" width="5" height="18" rx="2" fill="#3D2E1A"/>
  <rect x="179" y="297" width="5" height="18" rx="2" fill="#3D2E1A"/>

  <!-- Chair near table 2 -->
  <rect x="270" y="250" width="28" height="32" rx="3" fill="#3D2E1A" opacity="0.85"/>
  <rect x="268" y="245" width="32" height="8" rx="3" fill="#4A3820" opacity="0.9"/>
  <rect x="352" y="250" width="28" height="32" rx="3" fill="#3D2E1A" opacity="0.85"/>
  <rect x="350" y="245" width="32" height="8" rx="3" fill="#4A3820" opacity="0.9"/>

  <!-- Chair near table 3 -->
  <rect x="468" y="262" width="28" height="32" rx="3" fill="#3D2E1A" opacity="0.85"/>
  <rect x="466" y="257" width="32" height="8" rx="3" fill="#4A3820" opacity="0.9"/>
  <rect x="552" y="262" width="28" height="32" rx="3" fill="#3D2E1A" opacity="0.85"/>
  <rect x="550" y="257" width="32" height="8" rx="3" fill="#4A3820" opacity="0.9"/>

  <!-- Umbrellas -->
  <!-- Umbrella 1 -->
  <rect x="127" y="220" width="6" height="70" rx="2" fill="#E8E0D0"/>
  <path d="M90 238 Q130 215 170 238" fill="#F0EAE0" stroke="#D0C8B8" stroke-width="1"/>
  <path d="M90 238 Q130 225 170 238" fill="none" stroke="#D0C8B8" stroke-width="0.5"/>

  <!-- Umbrella 2 -->
  <rect x="517" y="210" width="6" height="75" rx="2" fill="#E8E0D0"/>
  <path d="M477 228 Q520 205 563 228" fill="#F0EAE0" stroke="#D0C8B8" stroke-width="1"/>
  <path d="M477 228 Q520 215 563 228" fill="none" stroke="#D0C8B8" stroke-width="0.5"/>

  <!-- People silhouettes (simplified) -->
  <!-- Person 1 -->
  <circle cx="110" cy="250" r="10" fill="#3D2E1A" opacity="0.7"/>
  <rect x="103" y="260" width="14" height="20" rx="4" fill="#5A4030" opacity="0.7"/>

  <!-- Person 2 -->
  <circle cx="155" cy="248" r="10" fill="#3D2E1A" opacity="0.7"/>
  <rect x="148" y="258" width="14" height="20" rx="4" fill="#8B4513" opacity="0.7"/>

  <!-- Person 3 -->
  <circle cx="310" cy="238" r="10" fill="#3D2E1A" opacity="0.7"/>
  <rect x="303" y="248" width="14" height="20" rx="4" fill="#2C3E50" opacity="0.7"/>

  <!-- Person 4 -->
  <circle cx="510" cy="246" r="10" fill="#3D2E1A" opacity="0.7"/>
  <rect x="503" y="256" width="14" height="20" rx="4" fill="#7F3C1C" opacity="0.7"/>

  <!-- Waiter silhouette (taller) -->
  <circle cx="420" cy="228" r="11" fill="#2C2C2C" opacity="0.8"/>
  <rect x="412" y="239" width="16" height="30" rx="3" fill="#1A1A1A" opacity="0.8"/>
  <!-- Apron -->
  <rect x="414" y="252" width="12" height="18" rx="2" fill="#E8E0D0" opacity="0.7"/>

  <!-- Shadow overlay for depth -->
  <rect width="800" height="400" fill="url(#shadow)"/>

  <!-- Warm light overlay - simulate golden hour -->
  <rect width="800" height="400" fill="rgba(255, 200, 100, 0.08)"/>
</svg>
